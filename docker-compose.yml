services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: visa_gestion
      POSTGRES_USER: app_dev
      POSTGRES_PASSWORD: dev_pwd
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_dev -d visa_gestion"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./visa-backoffice
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/visa_gestion?currentSchema=dev
      SPRING_DATASOURCE_USERNAME: app_dev
      SPRING_DATASOURCE_PASSWORD: dev_pwd
    depends_on:
      db:
        condition: service_healthy

  front-office:
    build: ./front-office
    ports:
      - "5174:5174"
    environment:
      VITE_API_TARGET: http://app:8080
    depends_on:
      - app
    volumes:
      - ./front-office/src:/app/src

volumes:
  postgres_data:
