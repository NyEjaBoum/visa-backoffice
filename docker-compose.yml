services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: visa_gestion
      POSTGRES_USER: app_dev
      POSTGRES_PASSWORD: dev_pwd
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_dev -d visa_gestion"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/visa_gestion?currentSchema=dev
      SPRING_DATASOURCE_USERNAME: app_dev
      SPRING_DATASOURCE_PASSWORD: dev_pwd
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
