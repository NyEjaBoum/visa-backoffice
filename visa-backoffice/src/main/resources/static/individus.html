<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Individus - Visa Backoffice</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(15, 23, 42, 0.08);
        }

        .page-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        .page-header p {
            margin-top: 6px;
            color: #64748b;
            font-size: 14px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: linear-gradient(135deg, #f1f5f9 0%, #e8f0f7 100%);
        }

        thead th {
            padding: 14px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #64748b;
            border-bottom: 1px solid rgba(15, 23, 42, 0.08);
        }

        tbody tr {
            border-bottom: 1px solid rgba(15, 23, 42, 0.05);
            transition: background 0.15s ease;
        }

        tbody tr:last-child { border-bottom: none; }

        tbody tr:hover { background: #f8fbff; }

        tbody td {
            padding: 14px 16px;
            color: #1e293b;
            vertical-align: middle;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .nom-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .passport-num {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: 700;
            color: #0f172a;
            background: #f1f5f9;
            padding: 3px 8px;
            border-radius: 6px;
        }

        .btn-voir {
            background: transparent;
            border: 1.5px solid #0ea5e9;
            color: #0ea5e9;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s ease;
        }

        .btn-voir:hover {
            background: #0ea5e9;
            color: #fff;
        }

        .expired {
            color: #b91c1c;
            font-weight: 600;
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .page-header { flex-direction: column; align-items: flex-start; gap: 12px; }
        }
    </style>
</head>
<body class="app-body">
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-logo">Visa</div>
        <div class="sidebar-subtitle">Navigation</div>
        <ul class="sidebar-menu">
            <li><a class="sidebar-link" href="dashboard.html">Dashboard</a></li>
            <li><a class="sidebar-link" href="dossiers.html">Dossiers</a></li>
            <li><a class="sidebar-link" href="individus.html">Individus</a></li>
            <li><a class="sidebar-link" href="demande.html">Cr&#233;er un dossier</a></li>
            <li><a class="sidebar-link" href="index.html">D&#233;connexion</a></li>
        </ul>
    </aside>

    <main class="app-content">
        <section class="app-panel">
            <div class="page-header">
                <div>
                    <h1>Individus</h1>
                    <p>Liste de tous les demandeurs enregistr&#233;s.</p>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Pr&#233;nom</th>
                            <th>Nationalit&#233;</th>
                            <th>Profession</th>
                            <th>Passeport</th>
                            <th>Exp. passeport</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                        <tr><td colspan="7" class="loading-state">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script>
    var links = document.querySelectorAll('.sidebar-link');
    for (var i = 0; i < links.length; i++) {
        var href = links[i].getAttribute('href');
        if (href && window.location.pathname.endsWith(href)) {
            links[i].classList.add('active');
        }
    }

    function initials(nom, prenom) {
        return ((nom || ' ')[0] + (prenom || ' ')[0]).toUpperCase();
    }

    function formatDate(val) {
        if (!val) return '-';
        return new Date(val).toLocaleDateString('fr-FR');
    }

    function isExpired(val) {
        if (!val) return false;
        return new Date(val) < new Date();
    }

    fetch('/api/individus/complets')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var tbody = document.getElementById('tbody');
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="loading-state">Aucun individu enregistr&#233;.</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(function(p) {
                var exp = p.dateExpiration;
                var expClass = isExpired(exp) ? 'expired' : '';
                return '<tr>' +
                    '<td><div class="nom-cell"><div class="avatar">' + initials(p.nom, p.prenom) + '</div>' + (p.nom || '-') + '</div></td>' +
                    '<td>' + (p.prenom || '-') + '</td>' +
                    '<td>' + (p.nationalite || '-') + '</td>' +
                    '<td>' + (p.profession || '-') + '</td>' +
                    '<td><span class="passport-num">' + (p.passeportNumero || '-') + '</span></td>' +
                    '<td class="' + expClass + '">' + formatDate(exp) + '</td>' +
                    '<td><a class="btn-voir" href="fiche-individu.html?id=' + p.individuId + '">Voir</a></td>' +
                '</tr>';
            }).join('');
        })
        .catch(function() {
            document.getElementById('tbody').innerHTML =
                '<tr><td colspan="7" class="loading-state">Erreur de chargement.</td></tr>';
        });
</script>
</body>
</html>
