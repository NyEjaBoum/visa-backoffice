<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Visa Backoffice</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .error-msg {
            color: #d32f2f;
            font-size: 14px;
            margin-bottom: 12px;
            display: none;
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="login-section">
            <div class="form-wrapper">
                <div class="logo">
                    <h1 class="visa-logo">Visa</h1>
                </div>

                <div class="header-text">
                    <h2>Connexion à votre compte</h2>
                    <p>Veuillez saisir vos identifiants</p>
                </div>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="identifiant">Identifiant</label>
                        <input type="text" id="identifiant" placeholder="Votre identifiant" required autocomplete="username">
                    </div>

                    <div class="input-group">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>

                    <p class="error-msg" id="errorMsg"></p>

                    <button type="submit" class="btn-primary" id="submitBtn">Se connecter</button>
                </form>
            </div>
        </div>

        <div class="hero-section hero-image-bg"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.textContent = 'Connexion...';
            errorMsg.style.display = 'none';

            const body = {
                identifiant: document.getElementById('identifiant').value,
                mdp: document.getElementById('password').value
            };

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Erreur de connexion');
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('userId', data.userId);
                localStorage.setItem('identifiant', data.identifiant);
                localStorage.setItem('role', data.role);
                localStorage.setItem('permissions', JSON.stringify(data.permissions));
                localStorage.setItem('statuts', JSON.stringify(data.statuts));
                localStorage.setItem('typeVisa', JSON.stringify(data.typeVisa));
                localStorage.setItem('typeDemande', JSON.stringify(data.typeDemande));

                window.location.href = '/dashboard.html';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Se connecter';
            }
        });
    </script>
</body>
</html>
