<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiche Dossier - Visa Backoffice</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(15, 23, 42, 0.08);
            gap: 16px;
        }

        .page-header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        .page-header-sub {
            margin-top: 6px;
            color: #64748b;
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            color: #fff;
            box-shadow: 0 2px 8px rgba(14, 165, 233, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(14, 165, 233, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: #fff;
            box-shadow: 0 2px 8px rgba(34, 197, 94, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(34, 197, 94, 0.4);
        }

        .btn-back {
            background: #f1f5f9;
            color: #475569;
            border: 1.5px solid #cbd5e1;
        }

        .btn-back:hover {
            background: #e2e8f0;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-cree   { background: #dbeafe; color: #1d4ed8; }
        .badge-valide { background: #dcfce7; color: #15803d; }
        .badge-annule { background: #fee2e2; color: #b91c1c; }

        .section {
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 20px;
            background: #f9fafb;
            transition: border-color 0.2s;
        }

        .section:hover {
            border-color: rgba(14, 165, 233, 0.2);
        }

        .section h2 {
            margin: 0 0 18px;
            font-size: 15px;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .section h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background: #0ea5e9;
            border-radius: 2px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 14px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
        }

        .field-value {
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
        }

        .field-value.mono {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            background: #f1f5f9;
            padding: 3px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        .pieces-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .piece-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            background: #fff;
            border: 1px solid rgba(15, 23, 42, 0.08);
        }

        .piece-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .piece-present  { background: #dcfce7; color: #15803d; }
        .piece-absent   { background: #fee2e2; color: #b91c1c; }

        .piece-label {
            font-size: 13px;
            color: #334155;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            display: none;
        }

        .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
        .alert-error   { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; }
        }
    </style>
</head>
<body class="app-body">
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-logo">Visa</div>
        <div class="sidebar-subtitle">Navigation</div>
        <ul class="sidebar-menu">
            <li><a class="sidebar-link" href="dashboard.html">Dashboard</a></li>
            <li><a class="sidebar-link" href="dossiers.html">Dossiers</a></li>
            <li><a class="sidebar-link" href="individus.html">Individus</a></li>
            <li><a class="sidebar-link" href="demande.html">Cr&#233;er un dossier</a></li>
            <li><a class="sidebar-link" href="index.html">D&#233;connexion</a></li>
        </ul>
    </aside>

    <main class="app-content">
        <section class="app-panel" id="content">
            <div class="loading-state">Chargement du dossier...</div>
        </section>
    </main>
</div>

<script>
    var links = document.querySelectorAll('.sidebar-link');
    for (var i = 0; i < links.length; i++) {
        var href = links[i].getAttribute('href');
        if (href && window.location.pathname.endsWith(href)) {
            links[i].classList.add('active');
        }
    }

    function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
    }

    function formatDate(val) {
        if (!val) return '-';
        var d = new Date(val);
        return d.toLocaleDateString('fr-FR');
    }

    function statutBadge(statut) {
        var cls = 'badge-cree';
        if (statut === 'VALIDE') cls = 'badge-valide';
        else if (statut === 'ANNULE') cls = 'badge-annule';
        return '<span class="badge ' + cls + '">' + statut + '</span>';
    }

    function field(label, value, mono) {
        var v = value || '-';
        var cls = mono ? 'field-value mono' : 'field-value';
        return '<div class="field"><span class="field-label">' + label + '</span><span class="' + cls + '">' + v + '</span></div>';
    }

    var id = getParam('id');
    if (!id) {
        document.getElementById('content').innerHTML = '<div class="loading-state">Identifiant manquant.</div>';
    } else {
        fetch('/api/dossiers/' + id)
            .then(function(r) {
                if (!r.ok) throw new Error('not found');
                return r.json();
            })
            .then(function(d) {
                var canValidate = (d.statut === 'CREE');
                document.getElementById('content').innerHTML =
                    '<div class="page-header">' +
                        '<div>' +
                            '<h1>Dossier <span style="color:#0ea5e9">' + d.numDemande + '</span></h1>' +
                            '<div class="page-header-sub">Cr&#233;&#233; le ' + formatDate(d.dateCreation) + ' &nbsp;&#8226;&nbsp; ' + statutBadge(d.statut) + '</div>' +
                        '</div>' +
                        '<div class="header-actions">' +
                            (canValidate ? '<button class="btn btn-success" onclick="valider(' + d.id + ')">Valider</button>' : '') +
                            '<a class="btn btn-back" href="dossiers.html">&#8592; Retour</a>' +
                        '</div>' +
                    '</div>' +

                    '<div id="alert" class="alert"></div>' +

                    '<div class="section">' +
                        '<h2>Demande</h2>' +
                        '<div class="grid-3">' +
                            field('N&#176; Demande', d.numDemande, true) +
                            field('Type visa', d.typeVisa) +
                            field('Type demande', d.typeDemande) +
                        '</div>' +
                    '</div>' +

                    '<div class="section">' +
                        '<h2>&#201;tat civil</h2>' +
                        '<div class="grid-3">' +
                            field('Nom', d.individuNom) +
                            field('Pr&#233;noms', d.individuPrenoms) +
                            field('Date de naissance', formatDate(d.individuDateNaissance)) +
                        '</div>' +
                        '<div style="margin-top:12px"><a href="fiche-individu.html?id=' + d.individuId + '" style="font-size:13px;color:#0ea5e9;font-weight:600;text-decoration:none;">&#8594; Voir fiche individu</a></div>' +
                    '</div>' +

                    '<div class="section">' +
                        '<h2>Passeport</h2>' +
                        '<div class="grid-3">' +
                            field('Num&#233;ro', d.passeportNumero, true) +
                            field('D&#233;livr&#233; le', formatDate(d.passeportDateDelivrance)) +
                            field('Expire le', formatDate(d.passeportDateExpiration)) +
                        '</div>' +
                    '</div>' +

                    (d.visaTransformableReference ? (
                        '<div class="section">' +
                            '<h2>Visa transformable</h2>' +
                            '<div class="grid-3">' +
                                field('R&#233;f&#233;rence', d.visaTransformableReference, true) +
                                field('Date d\'entr&#233;e', formatDate(d.visaTransformableDateEntree)) +
                                field('Lieu d\'entr&#233;e', d.visaTransformableLieuEntree) +
                                field('Fin du visa', formatDate(d.visaTransformableDateFinVisa)) +
                            '</div>' +
                        '</div>'
                    ) : '') +

                    (d.pieces && d.pieces.length ? (
                        '<div class="section">' +
                            '<h2>Pi&#232;ces fournies</h2>' +
                            '<div class="pieces-list">' +
                                d.pieces.map(function(p) {
                                    var present = p.present;
                                    return '<div class="piece-item">' +
                                        '<div class="piece-icon ' + (present ? 'piece-present' : 'piece-absent') + '">' + (present ? '&#10003;' : '&#10005;') + '</div>' +
                                        '<span class="piece-label">' + p.libellePiece + '</span>' +
                                    '</div>';
                                }).join('') +
                            '</div>' +
                        '</div>'
                    ) : '');
            })
            .catch(function() {
                document.getElementById('content').innerHTML = '<div class="loading-state">Dossier introuvable.</div>';
            });
    }

    function valider(dossierId) {
        fetch('/api/dossiers/' + dossierId + '/valider', { method: 'PUT' })
            .then(function(r) {
                if (!r.ok) throw new Error();
                return r.json();
            })
            .then(function() {
                window.location.reload();
            })
            .catch(function() {
                var al = document.getElementById('alert');
                if (al) {
                    al.textContent = 'Erreur lors de la validation.';
                    al.className = 'alert alert-error';
                    al.style.display = 'block';
                }
            });
    }
</script>
</body>
</html>
