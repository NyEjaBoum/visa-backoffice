<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creation de Dossier - Visa Backoffice</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page {
            background: linear-gradient(135deg, #ffffff 0%, #f9fafb 100%);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(15, 23, 42, 0.08);
            padding: 32px;
            border: 1px solid rgba(15, 23, 42, 0.06);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        .section {
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 20px;
            background: #f9fafb;
            transition: all 0.3s ease;
        }

        .section:hover {
            border-color: rgba(14, 165, 233, 0.2);
            background: #fafbfd;
        }

        .section h2 {
            margin: 0 0 16px;
            color: #0f172a;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 13px;
            color: #334155;
            font-weight: 700;
            text-transform: capitalize;
        }

        input, select {
            border: 1.5px solid #cbd5e1;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 14px;
            background: #ffffff;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
            background: #f8fdff;
        }

        input:hover, select:hover {
            border-color: #94a3b8;
        }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid rgba(15, 23, 42, 0.08);
        }

        button {
            border: none;
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            color: #fff;
            padding: 14px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            color: #dc2626;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 12px;
            background: #fee2e2;
            border-radius: 8px;
            border-left: 3px solid #dc2626;
        }

        .success {
            color: #15803d;
            font-size: 13px;
            font-weight: 600;
            padding: 10px 12px;
            background: #dcfce7;
            border-radius: 8px;
            border-left: 3px solid #15803d;
        }

        @media (max-width: 800px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .page {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body class="app-body">
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-logo">Visa</div>
        <div class="sidebar-subtitle">Navigation</div>
        <ul class="sidebar-menu">
            <li><a class="sidebar-link" href="dashboard.html">Dashboard</a></li>
            <li><a class="sidebar-link" href="demande.html">Creation de dossier</a></li>
            <li><a class="sidebar-link" href="index.html">Deconnexion</a></li>
        </ul>
    </aside>

    <main class="app-content">
        <div class="page">
            <h1>Creation de dossier</h1>

            <form id="dossierForm">
        <div class="section">
            <h2>Nature de la demarche</h2>
            <div class="input-group">
                <label for="typeDemandeId">Type de demande</label>
                <select id="typeDemandeId" required></select>
            </div>
        </div>

        <div class="section">
            <h2>1. Etat civil</h2>
            <div class="grid">
                <div class="input-group">
                    <label for="nom">Nom</label>
                    <input id="nom" required>
                </div>
                <div class="input-group">
                    <label for="prenoms">Prenoms</label>
                    <input id="prenoms" required>
                </div>
                <div class="input-group">
                    <label for="nomJeuneFille">Nom de jeune fille</label>
                    <input id="nomJeuneFille">
                </div>
                <div class="input-group">
                    <label for="dateNaissance">Date de naissance</label>
                    <input type="date" id="dateNaissance" required>
                </div>
                <div class="input-group">
                    <label for="situationFamiliale">Situation familiale</label>
                    <input id="situationFamiliale">
                </div>
                <div class="input-group">
                    <label for="nationalite">Nationalite</label>
                    <input id="nationalite">
                </div>
                <div class="input-group">
                    <label for="profession">Profession</label>
                    <input id="profession">
                </div>
                <div class="input-group">
                    <label for="adresseMada">Adresse a Madagascar</label>
                    <input id="adresseMada">
                </div>
                <div class="input-group">
                    <label for="contactMada">Contact a Madagascar</label>
                    <input id="contactMada">
                </div>
            </div>
        </div>

        <div class="section">
            <h2>2. Voyage (Passeport / Visa)</h2>
            <div class="grid">
                <div class="input-group">
                    <label for="numeroPasseport">Numero de passeport</label>
                    <input id="numeroPasseport" required>
                </div>
                <div class="input-group">
                    <label for="dateDelivrancePasseport">Date de delivrance</label>
                    <input type="date" id="dateDelivrancePasseport">
                </div>
                <div class="input-group">
                    <label for="dateExpirationPasseport">Date d expiration du passeport</label>
                    <input type="date" id="dateExpirationPasseport" required>
                </div>
                <div class="input-group">
                    <label for="refVisaTransformable">Reference du visa transformable (obligatoire)</label>
                    <input id="refVisaTransformable" required>
                </div>
                <div class="input-group">
                    <label for="dateEntree">Date d entree a Madagascar</label>
                    <input type="date" id="dateEntree">
                </div>
                <div class="input-group">
                    <label for="lieuEntree">Lieu d entree</label>
                    <input id="lieuEntree">
                </div>
                <div class="input-group">
                    <label for="dateFinVisa">Date de fin du visa actuel</label>
                    <input type="date" id="dateFinVisa">
                </div>
            </div>
        </div>

        <div class="section">
            <h2>3. Categorie</h2>
            <div class="input-group">
                <label for="typeVisaId">Type de visa</label>
                <select id="typeVisaId" required></select>
            </div>
        </div>

        <div class="actions">
            <button type="submit" id="submitBtn">Enregistrer et generer le numero de dossier</button>
            <span id="feedback"></span>
        </div>
            </form>
        </div>
    </main>
</div>

<script>
    var typeDemandeSelect = document.getElementById('typeDemandeId');
    var typeVisaSelect = document.getElementById('typeVisaId');
    var feedback = document.getElementById('feedback');
    var submitBtn = document.getElementById('submitBtn');

    var links = document.querySelectorAll('.sidebar-link');
    for (var i = 0; i < links.length; i++) {
        var link = links[i];
        var href = link.getAttribute('href');
        if (href && window.location.pathname.slice(-href.length) === href) {
            link.classList.add('active');
        }
    }

    function fillSelect(select, items, fallback) {
        select.innerHTML = '';
        var source = Array.isArray(items) && items.length ? items : fallback;
        for (var j = 0; j < source.length; j++) {
            var item = source[j];
            var option = document.createElement('option');
            option.value = String(item.id);
            option.textContent = item.libelle;
            select.appendChild(option);
        }
    }

    function initNomenclatures() {
        var typeDemande = JSON.parse(localStorage.getItem('typeDemande') || '[]');
        var typeVisa = JSON.parse(localStorage.getItem('typeVisa') || '[]');

        fillSelect(typeDemandeSelect, typeDemande, [
            { id: 1, libelle: 'NOUVEAU TITRE' },
            { id: 2, libelle: 'TRANSFERT' },
            { id: 3, libelle: 'DUPLICATA' }
        ]);

        fillSelect(typeVisaSelect, typeVisa, [
            { id: 1, libelle: 'ETUDIANT' },
            { id: 2, libelle: 'TRAVAILLEUR' },
            { id: 3, libelle: 'INVESTISSEUR' }
        ]);
    }

    function serializeForm() {
        return {
            typeDemandeId: Number(typeDemandeSelect.value),
            typeVisaId: Number(typeVisaSelect.value),
            nom: document.getElementById('nom').value,
            prenoms: document.getElementById('prenoms').value,
            nomJeuneFille: document.getElementById('nomJeuneFille').value,
            dateNaissance: document.getElementById('dateNaissance').value,
            situationFamiliale: document.getElementById('situationFamiliale').value,
            nationalite: document.getElementById('nationalite').value,
            profession: document.getElementById('profession').value,
            adresseMada: document.getElementById('adresseMada').value,
            contactMada: document.getElementById('contactMada').value,
            numeroPasseport: document.getElementById('numeroPasseport').value,
            dateDelivrancePasseport: document.getElementById('dateDelivrancePasseport').value || null,
            dateExpirationPasseport: document.getElementById('dateExpirationPasseport').value,
            refVisaTransformable: document.getElementById('refVisaTransformable').value,
            dateEntree: document.getElementById('dateEntree').value || null,
            lieuEntree: document.getElementById('lieuEntree').value,
            dateFinVisa: document.getElementById('dateFinVisa').value || null
        };
    }

    document.getElementById('dossierForm').addEventListener('submit', function (e) {
        e.preventDefault();

        feedback.className = 'error';
        feedback.textContent = '';

        var expiration = document.getElementById('dateExpirationPasseport').value;
        if (expiration && new Date(expiration) < new Date(new Date().toISOString().slice(0, 10))) {
            feedback.textContent = 'Le passeport ne doit pas etre expire.';
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Enregistrement en cours...';

        fetch('/api/dossiers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(serializeForm())
        })
        .then(function(response) {
            return response.json().then(function(data) {
                return { status: response.status, data: data };
            });
        })
        .then(function(result) {
            if (result.status !== 201) {
                throw new Error(result.data.message || 'Erreur pendant la creation du dossier');
            }

            feedback.className = 'success';
            feedback.textContent = 'Dossier cree avec succes: ' + result.data.numDemande;
            document.getElementById('dossierForm').reset();
            initNomenclatures();
            setTimeout(function() {
                feedback.textContent = '';
            }, 5000);
        })
        .catch(function(err) {
            feedback.className = 'error';
            feedback.textContent = err.message;
        })
        .then(function() {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Enregistrer et generer le numero de dossier';
        });
    });

    initNomenclatures();
</script>
</body>
</html>
