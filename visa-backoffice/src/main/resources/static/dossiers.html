<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossiers - Visa Backoffice</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(15, 23, 42, 0.08);
        }

        .page-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        .page-header p {
            margin-top: 6px;
            color: #64748b;
            font-size: 14px;
        }

        .btn-link {
            text-decoration: none;
            display: inline-block;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            color: #fff;
            box-shadow: 0 2px 8px rgba(14, 165, 233, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(14, 165, 233, 0.4);
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: linear-gradient(135deg, #f1f5f9 0%, #e8f0f7 100%);
        }

        thead th {
            padding: 14px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #64748b;
            border-bottom: 1px solid rgba(15, 23, 42, 0.08);
        }

        tbody tr {
            border-bottom: 1px solid rgba(15, 23, 42, 0.05);
            transition: background 0.15s ease;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background: #f8fbff;
        }

        tbody td {
            padding: 14px 16px;
            color: #1e293b;
            vertical-align: middle;
        }

        .num-demande {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: 700;
            color: #0f172a;
            background: #f1f5f9;
            padding: 3px 8px;
            border-radius: 6px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .badge-cree    { background: #dbeafe; color: #1d4ed8; }
        .badge-valide  { background: #dcfce7; color: #15803d; }
        .badge-annule  { background: #fee2e2; color: #b91c1c; }

        .btn-voir {
            background: transparent;
            border: 1.5px solid #0ea5e9;
            color: #0ea5e9;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s ease;
        }

        .btn-voir:hover {
            background: #0ea5e9;
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        .empty-state p {
            font-size: 15px;
            margin-top: 8px;
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>
<body class="app-body">
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-logo">Visa</div>
        <div class="sidebar-subtitle">Navigation</div>
        <ul class="sidebar-menu">
            <li><a class="sidebar-link" href="dashboard.html">Dashboard</a></li>
            <li><a class="sidebar-link" href="dossiers.html">Dossiers</a></li>
            <li><a class="sidebar-link" href="individus.html">Individus</a></li>
            <li><a class="sidebar-link" href="demande.html">Cr&#233;er un dossier</a></li>
            <li><a class="sidebar-link" href="index.html">D&#233;connexion</a></li>
        </ul>
    </aside>

    <main class="app-content">
        <section class="app-panel">
            <div class="page-header">
                <div>
                    <h1>Dossiers</h1>
                    <p>Liste de toutes les demandes de visa enregistr&#233;es.</p>
                </div>
                <a class="btn-link btn-primary" href="demande.html">+ Nouveau dossier</a>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>N&#176; Demande</th>
                            <th>Nom</th>
                            <th>Pr&#233;nom</th>
                            <th>Type Visa</th>
                            <th>Type Demande</th>
                            <th>Statut</th>
                            <th>Date cr&#233;ation</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                        <tr>
                            <td colspan="8" class="loading-state">Chargement...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script>
    var links = document.querySelectorAll('.sidebar-link');
    for (var i = 0; i < links.length; i++) {
        var href = links[i].getAttribute('href');
        if (href && window.location.pathname.endsWith(href)) {
            links[i].classList.add('active');
        }
    }

    function statutBadge(statut) {
        var cls = 'badge-cree';
        if (statut === 'VALIDE') cls = 'badge-valide';
        else if (statut === 'ANNULE') cls = 'badge-annule';
        return '<span class="badge ' + cls + '">' + statut + '</span>';
    }

    function formatDate(iso) {
        if (!iso) return '-';
        var d = new Date(iso);
        return d.toLocaleDateString('fr-FR');
    }

    fetch('/api/dossiers')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var tbody = document.getElementById('tbody');
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><p>Aucun dossier enregistr&#233;.</p></div></td></tr>';
                return;
            }
            tbody.innerHTML = data.map(function(d) {
                return '<tr>' +
                    '<td><span class="num-demande">' + d.numDemande + '</span></td>' +
                    '<td>' + (d.nom || '-') + '</td>' +
                    '<td>' + (d.prenoms || '-') + '</td>' +
                    '<td>' + (d.typeVisa || '-') + '</td>' +
                    '<td>' + (d.typeDemande || '-') + '</td>' +
                    '<td>' + statutBadge(d.statut) + '</td>' +
                    '<td>' + formatDate(d.dateCreation) + '</td>' +
                    '<td><a class="btn-voir" href="fiche-dossier.html?id=' + d.id + '">Voir</a></td>' +
                '</tr>';
            }).join('');
        })
        .catch(function() {
            document.getElementById('tbody').innerHTML =
                '<tr><td colspan="8" class="loading-state">Erreur de chargement.</td></tr>';
        });
</script>
</body>
</html>
