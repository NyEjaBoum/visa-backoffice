<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiche Individu - Visa Backoffice</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(15, 23, 42, 0.08);
            gap: 16px;
        }

        .identity-block {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar-lg {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.35);
        }

        .page-header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        .page-header-sub {
            margin-top: 4px;
            color: #64748b;
            font-size: 13px;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-back {
            background: #f1f5f9;
            color: #475569;
            border: 1.5px solid #cbd5e1;
        }

        .btn-back:hover { background: #e2e8f0; }

        .section {
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 20px;
            background: #f9fafb;
            transition: border-color 0.2s;
        }

        .section:hover { border-color: rgba(14, 165, 233, 0.2); }

        .section h2 {
            margin: 0 0 18px;
            font-size: 15px;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .section h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background: #0ea5e9;
            border-radius: 2px;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

        .field { display: flex; flex-direction: column; gap: 4px; }

        .field-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
        }

        .field-value {
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
        }

        .field-value.mono {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            background: #f1f5f9;
            padding: 3px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        .expired-tag {
            display: inline-block;
            background: #fee2e2;
            color: #b91c1c;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
            margin-left: 6px;
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; }
        }
    </style>
</head>
<body class="app-body">
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-logo">Visa</div>
        <div class="sidebar-subtitle">Navigation</div>
        <ul class="sidebar-menu">
            <li><a class="sidebar-link" href="dashboard.html">Dashboard</a></li>
            <li><a class="sidebar-link" href="dossiers.html">Dossiers</a></li>
            <li><a class="sidebar-link" href="individus.html">Individus</a></li>
            <li><a class="sidebar-link" href="demande.html">Cr&#233;er un dossier</a></li>
            <li><a class="sidebar-link" href="index.html">D&#233;connexion</a></li>
        </ul>
    </aside>

    <main class="app-content">
        <section class="app-panel" id="content">
            <div class="loading-state">Chargement de la fiche...</div>
        </section>
    </main>
</div>

<script>
    var links = document.querySelectorAll('.sidebar-link');
    for (var i = 0; i < links.length; i++) {
        var href = links[i].getAttribute('href');
        if (href && window.location.pathname.endsWith(href)) {
            links[i].classList.add('active');
        }
    }

    function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
    }

    function formatDate(val) {
        if (!val) return '-';
        return new Date(val).toLocaleDateString('fr-FR');
    }

    function isExpired(val) {
        return val && new Date(val) < new Date();
    }

    function initials(nom, prenom) {
        return ((nom || ' ')[0] + (prenom || ' ')[0]).toUpperCase();
    }

    function field(label, value, mono) {
        var v = value || '-';
        var cls = mono ? 'field-value mono' : 'field-value';
        return '<div class="field"><span class="field-label">' + label + '</span><span class="' + cls + '">' + v + '</span></div>';
    }

    var id = getParam('id');
    if (!id) {
        document.getElementById('content').innerHTML = '<div class="loading-state">Identifiant manquant.</div>';
    } else {
        fetch('/api/individus/' + id + '/complet')
            .then(function(r) {
                if (!r.ok) throw new Error();
                return r.json();
            })
            .then(function(p) {
                var expExpired = isExpired(p.dateExpiration);
                var expLabel = formatDate(p.dateExpiration) + (expExpired ? '<span class="expired-tag">Expir&#233;</span>' : '');

                document.getElementById('content').innerHTML =
                    '<div class="page-header">' +
                        '<div class="identity-block">' +
                            '<div class="avatar-lg">' + initials(p.nom, p.prenom) + '</div>' +
                            '<div>' +
                                '<h1>' + (p.nom || '') + ' ' + (p.prenom || '') + '</h1>' +
                                '<div class="page-header-sub">' + (p.nationalite || '') + (p.profession ? ' &nbsp;&#8226;&nbsp; ' + p.profession : '') + '</div>' +
                            '</div>' +
                        '</div>' +
                        '<a class="btn btn-back" href="individus.html">&#8592; Retour</a>' +
                    '</div>' +

                    '<div class="section">' +
                        '<h2>&#201;tat civil</h2>' +
                        '<div class="grid-3">' +
                            field('Nom', p.nom) +
                            field('Pr&#233;noms', p.prenom) +
                            field('Nom de jeune fille', p.nomJeuneFille) +
                            field('Date de naissance', formatDate(p.dateNaissance)) +
                            field('Situation familiale', p.situationFamiliale) +
                            field('Nationalit&#233;', p.nationalite) +
                        '</div>' +
                    '</div>' +

                    '<div class="section">' +
                        '<h2>Coordonn&#233;es</h2>' +
                        '<div class="grid-2">' +
                            field('Profession', p.profession) +
                            field('Adresse &#224; Madagascar', p.adresseMada) +
                            field('Contact', p.contact) +
                        '</div>' +
                    '</div>' +

                    '<div class="section">' +
                        '<h2>Passeport</h2>' +
                        '<div class="grid-3">' +
                            field('Num&#233;ro', p.passeportNumero, true) +
                            field('Date de d&#233;livrance', formatDate(p.dateDelivrance)) +
                            '<div class="field"><span class="field-label">Date d\'expiration</span><span class="field-value">' + expLabel + '</span></div>' +
                        '</div>' +
                    '</div>';
            })
            .catch(function() {
                document.getElementById('content').innerHTML = '<div class="loading-state">Individu introuvable.</div>';
            });
    }
</script>
</body>
</html>
