<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${demandeId != null} ? 'Modifier la demande — Visa Backoffice' : 'Nouvelle demande — Visa Backoffice'">Demande</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body class="app-body">
<div class="app-layout">

    <div th:replace="~{fragments/sidebar :: sidebar(${demandeId != null} ? 'demandes' : 'nouveau')}"></div>

    <main class="app-content">
        <div class="page">
            <div class="page-header">
                <h1 class="page-title"
                    th:text="${demandeId != null} ? 'Modifier la demande' : 'Nouvelle demande de visa'">Demande</h1>
                <p class="page-subtitle" th:if="${numDemande != null}">
                    Dossier : <strong th:text="${numDemande}"></strong>
                </p>
                <p class="page-subtitle" th:if="${numDemande == null}">
                    Remplissez les informations ci-dessous pour enregistrer la demande.
                </p>
            </div>

            <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

            <form th:action="${demandeId != null} ? @{/demandes/{id}/modifier(id=${demandeId})} : @{/demandes}"
                  th:object="${form}"
                  method="post">

                <!-- Pré-remplissage via recherche (nouvelle demande uniquement) -->
                <div class="section" th:if="${demandeId == null}">
                    <h2 class="section-title">Pré-remplissage (recherche)</h2>
                    <p class="page-subtitle" style="margin-bottom:12px;">
                        Saisir un nom, un numéro de passeport, un numéro de dossier ou un numéro de visa transformable.
                    </p>
                    <div class="autocomplete-wrapper" style="max-width:520px;">
                        <input type="text" id="prefillSearchInput" class="form-input"
                               placeholder="Ex : DUPONT, AB123456, MADA-2026-0001, VT-2026-0001"
                               autocomplete="off">
                        <div class="autocomplete-list" id="prefillAutocompleteList" style="display:none;"></div>
                    </div>
                    <div id="prefillInfo" class="alert alert-info" style="display:none;margin-top:12px;"></div>
                </div>

                <!-- Nature de la démarche -->
                <div class="section">
                    <h2 class="section-title">Nature de la démarche</h2>
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label" for="typeDemandeId">
                                Type de demande <span class="req">*</span>
                            </label>
                            <select id="typeDemandeId" th:field="*{typeDemandeId}" class="form-select" required>
                                <option value="">— Sélectionner —</option>
                                <option th:each="td : ${typesDemande}"
                                        th:value="${td.id}"
                                        th:text="${td.libelle}"></option>
                            </select>
                            <small class="form-error" th:if="${#fields.hasErrors('typeDemandeId')}" th:errors="*{typeDemandeId}"></small>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="typeVisaId">
                                Catégorie visa <span class="req">*</span>
                            </label>
                            <select id="typeVisaId" th:field="*{typeVisaId}" class="form-select" required>
                                <option value="">— Sélectionner —</option>
                                <option th:each="tv : ${typesVisa}"
                                        th:value="${tv.id}"
                                        th:text="${tv.libelle}"></option>
                            </select>
                            <small class="form-error" th:if="${#fields.hasErrors('typeVisaId')}" th:errors="*{typeVisaId}"></small>
                        </div>
                    </div>
                </div>

                <!-- État civil -->
                <div class="section">
                    <h2 class="section-title">1. État civil</h2>
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label" for="nom">Nom <span class="req">*</span></label>
                            <input type="text" id="nom" th:field="*{nom}"
                                   class="form-input" placeholder="Nom de famille" required>
                            <small class="form-error" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></small>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="prenoms">Prénoms</label>
                            <input type="text" id="prenoms" th:field="*{prenoms}"
                                   class="form-input" placeholder="Prénoms">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="nomJeuneFille">Nom de jeune fille</label>
                            <input type="text" id="nomJeuneFille" th:field="*{nomJeuneFille}"
                                   class="form-input" placeholder="Nom de naissance">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="dateNaissance">
                                Date de naissance <span class="req">*</span>
                            </label>
                            <input type="date" id="dateNaissance" th:field="*{dateNaissance}"
                                   class="form-input" required>
                            <small class="form-error" th:if="${#fields.hasErrors('dateNaissance')}" th:errors="*{dateNaissance}"></small>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="situationFamilialeId">Situation familiale</label>
                            <select id="situationFamilialeId" th:field="*{situationFamilialeId}" class="form-select">
                                <option value="">— Sélectionner —</option>
                                <option th:each="sf : ${situationsFamiliales}"
                                        th:value="${sf.id}"
                                        th:text="${sf.libelle}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="nationaliteId">
                                Nationalité <span class="req">*</span>
                            </label>
                            <select id="nationaliteId" th:field="*{nationaliteId}" class="form-select" required>
                                <option value="">— Sélectionner —</option>
                                <option th:each="nat : ${nationalites}"
                                        th:value="${nat.id}"
                                        th:text="${nat.libelle}"></option>
                            </select>
                            <small class="form-error" th:if="${#fields.hasErrors('nationaliteId')}" th:errors="*{nationaliteId}"></small>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="profession">Profession</label>
                            <input type="text" id="profession" th:field="*{profession}"
                                   class="form-input" placeholder="Profession exercée">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="adresseMada">
                                Adresse à Madagascar <span class="req">*</span>
                            </label>
                            <input type="text" id="adresseMada" th:field="*{adresseMada}"
                                   class="form-input" placeholder="Adresse complète" required>
                            <small class="form-error" th:if="${#fields.hasErrors('adresseMada')}" th:errors="*{adresseMada}"></small>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="contactMada">Contact à Madagascar</label>
                            <input type="text" id="contactMada" th:field="*{contactMada}"
                                   class="form-input" placeholder="Téléphone ou email">
                        </div>
                    </div>
                </div>

                <!-- Passeport -->
                <div class="section">
                    <h2 class="section-title">2. Passeport</h2>
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label" for="numeroPasseport">
                                Numéro de passeport <span class="req">*</span>
                            </label>
                            <input type="text" id="numeroPasseport" th:field="*{numeroPasseport}"
                                   class="form-input" placeholder="Ex : AB123456" required>
                            <small class="form-error" th:if="${#fields.hasErrors('numeroPasseport')}" th:errors="*{numeroPasseport}"></small>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="dateDelivrance">Date de délivrance</label>
                            <input type="date" id="dateDelivrance" th:field="*{dateDelivrance}" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="dateExpiration">Date d'expiration</label>
                            <input type="date" id="dateExpiration" th:field="*{dateExpiration}" class="form-input">
                        </div>
                    </div>
                </div>

                <!-- Visa transformable -->
                <div class="section">
                    <h2 class="section-title">3. Visa transformable</h2>
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label" for="visaTransformableNumero">Référence visa actuel</label>
                            <input type="text" id="visaTransformableNumero" th:field="*{visaTransformableNumero}"
                                   class="form-input" placeholder="Ex : VT-2026-0001">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="visaTransformableDateEntree">Date d'entrée</label>
                            <input type="date" id="visaTransformableDateEntree" th:field="*{visaTransformableDateEntree}"
                                   class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="visaTransformableLieuEntree">Lieu d'entrée</label>
                            <input type="text" id="visaTransformableLieuEntree" th:field="*{visaTransformableLieuEntree}"
                                   class="form-input" placeholder="Aéroport / Port / Frontière">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="visaTransformableDateFinVisa">Date fin visa actuel</label>
                            <input type="date" id="visaTransformableDateFinVisa" th:field="*{visaTransformableDateFinVisa}"
                                   class="form-input">
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary-app"
                            th:text="${demandeId != null} ? 'Enregistrer les modifications' : 'Créer le dossier'">
                        Créer le dossier
                    </button>
                    <a th:href="${demandeId != null} ? @{/demandes/{id}(id=${demandeId})} : @{/demandes}"
                       class="btn btn-ghost">Annuler</a>
                </div>
            </form>
        </div>
    </main>

</div>

<script>
    (function () {
        const input = document.getElementById('prefillSearchInput');
        const list = document.getElementById('prefillAutocompleteList');
        const info = document.getElementById('prefillInfo');

        if (!input || !list) return;

        let debounceTimer;
        let lastItems = [];

        function closeList() {
            list.style.display = 'none';
        }

        function setValue(id, value) {
            const el = document.getElementById(id);
            if (!el) return;
            el.value = value || '';
        }

        function setSelectValue(id, value) {
            const el = document.getElementById(id);
            if (!el) return;
            if (value === null || value === undefined || value === '') return;
            el.value = String(value);
        }

        function showInfo(item) {
            if (!info) return;
            const dossier = item.demandeNumero ? `Dossier : ${item.demandeNumero}` : 'Dossier : —';
            const passeport = item.passeportNumero ? `Passeport : ${item.passeportNumero}` : 'Passeport : —';
            const nationalite = item.nationalite ? `Nationalité : ${item.nationalite}` : 'Nationalité : —';
            info.textContent = `Pré-remplissage effectué. ${dossier} | ${passeport} | ${nationalite}`;
            info.style.display = 'flex';
        }

        function applyPrefill(item) {
            // selects
            setSelectValue('typeDemandeId', item.typeDemandeId);
            setSelectValue('typeVisaId', item.typeVisaId);
            setSelectValue('nationaliteId', item.nationaliteId);
            setSelectValue('situationFamilialeId', item.situationFamilialeId);

            // état civil
            setValue('nom', item.nom);
            setValue('prenoms', item.prenoms);
            setValue('nomJeuneFille', item.nomJeuneFille);
            setValue('dateNaissance', item.dateNaissance);
            setValue('profession', item.profession);
            setValue('adresseMada', item.adresseMada);
            setValue('contactMada', item.contactMada);

            // passeport
            setValue('numeroPasseport', item.passeportNumero);
            setValue('dateDelivrance', item.passeportDelivrance);
            setValue('dateExpiration', item.passeportExpiration);

            // visa transformable
            setValue('visaTransformableNumero', item.visaTransformableNumero);
            setValue('visaTransformableDateEntree', item.vtDateEntree);
            setValue('visaTransformableLieuEntree', item.vtLieuEntree);
            setValue('visaTransformableDateFinVisa', item.vtDateFin);

            showInfo(item);
        }

        function renderList(items) {
            lastItems = items || [];
            list.innerHTML = '';
            if (!items || items.length === 0) {
                closeList();
                return;
            }

            items.slice(0, 10).forEach(item => {
                const row = document.createElement('div');
                row.className = 'autocomplete-item';
                row.innerHTML = `<strong>${item.nom || ''} ${item.prenoms || ''}</strong>
                    <span>Passeport : ${item.passeportNumero || '—'} &nbsp;|&nbsp; Dossier : ${item.demandeNumero || '—'} &nbsp;|&nbsp; ${item.nationalite || ''}</span>`;
                row.addEventListener('click', () => {
                    closeList();
                    input.value = `${item.nom || ''} ${item.prenoms || ''}`.trim();
                    applyPrefill(item);
                });
                list.appendChild(row);
            });

            list.style.display = 'block';
        }

        function fetchAutocomplete(q) {
            fetch('/demandes/antecedents/autocomplete?q=' + encodeURIComponent(q))
                .then(r => r.json())
                .then(items => renderList(items))
                .catch(() => closeList());
        }

        input.addEventListener('input', function () {
            if (info) info.style.display = 'none';
            clearTimeout(debounceTimer);
            const q = this.value.trim();
            if (q.length < 2) {
                closeList();
                return;
            }
            debounceTimer = setTimeout(() => fetchAutocomplete(q), 300);
        });

        document.addEventListener('click', function (e) {
            if (!input.contains(e.target) && !list.contains(e.target)) {
                closeList();
            }
        });
    })();
</script>
</body>
</html>
