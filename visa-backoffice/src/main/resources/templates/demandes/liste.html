<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demandes — Visa Backoffice</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="app-shell">

    <div th:replace="~{fragments/sidebar :: sidebar('demandes')}"></div>

    <main class="page-wrapper">
        <header class="page-header">
            <div>
                <h1>Demandes</h1>
                <p>Liste de toutes les demandes enregistrées</p>
            </div>
            <div class="actions-group">
                <a th:href="@{/demandes/nouveau}" class="btn-create">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Nouveau dossier
                </a>
            </div>
        </header>

        <div class="canvas">
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

            <div class="paper" th:if="${!demandes.isEmpty()}">
                <table class="table">
                    <thead>
                    <tr>
                        <th>N° Dossier</th>
                        <th>Nom</th>
                        <th>Prénoms</th>
                        <th>Type de visa</th>
                        <th>Type de demande</th>
                        <th>Statut</th>
                        <th>Date création</th>
                        <th class="actions"></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="d : ${demandes}">
                        <td class="mono" style="font-weight:600;" th:text="${d.numDemande}">MADA-2026-0001</td>
                        <td th:text="${d.demandeur?.nom}">NOM</td>
                        <td th:text="${d.demandeur?.prenoms}">—</td>
                        <td th:text="${d.typeVisa?.libelle}">TRAVAILLEUR</td>
                        <td th:text="${d.typeDemande?.libelle}">NOUVEAU TITRE</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${d.statut?.libelle == 'ANNULE'} ? ' badge--danger' : (${d.statut?.libelle == 'VALIDE' or d.statut?.libelle == 'VISA APPROUVE' or d.statut?.libelle == 'SCAN TERMINE' or d.statut?.libelle == 'SCAN TERMINÉ'} ? ' badge--primary' : ' badge--muted')"
                                  th:text="${d.statut?.libelle}">CREE</span>
                        </td>
                        <td class="mono" th:text="${#temporals.format(d.dateCreation, 'dd/MM/yyyy HH:mm')}">—</td>
                        <td class="actions">
                            <a th:href="@{/demandes/{id}(id=${d.id})}" class="link-action">Voir →</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${demandes.isEmpty()}" class="paper">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div class="empty-state-text">Aucune demande enregistrée.<br>
                        <a th:href="@{/demandes/nouveau}" class="link-action" style="margin-top:8px;display:inline-block;">Créer la première demande →</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

</div>
</body>
</html>
