<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!--
  Usage: th:replace="~{fragments/sidebar :: sidebar('demandes')}"
  activeLink values: 'demandes', 'nouveau', 'antecedents'
-->
<aside th:fragment="sidebar(activeLink)" class="sidebar-container">

    <!-- Rail étroit à gauche -->
    <div class="sidebar-rail">
        <div class="logo-container">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f36d21" stroke-width="2.5">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
        </div>

        <a th:href="@{/demandes}"
           class="rail-icon"
           th:classappend="${activeLink == 'demandes'} ? ' active'"
           title="Dossiers">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14,2 14,8 20,8"/>
                <line x1="8" y1="13" x2="16" y2="13"/>
                <line x1="8" y1="17" x2="16" y2="17"/>
            </svg>
        </a>

        <a th:href="@{/demandes/nouveau}"
           class="rail-icon"
           th:classappend="${activeLink == 'nouveau'} ? ' active'"
           title="Nouveau dossier">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14,2 14,8 20,8"/>
                <line x1="12" y1="18" x2="12" y2="12"/>
                <line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
        </a>

        <a th:href="@{/demandes/antecedents}"
           class="rail-icon"
           th:classappend="${activeLink == 'antecedents'} ? ' active'"
           title="Antécédents">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </a>

        <div class="rail-bottom">
            <div class="rail-icon" title="Utilisateur">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            <form th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="rail-icon" title="Déconnexion" style="border:none;background:transparent;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16,17 21,12 16,7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Panneau principal -->
    <div class="sidebar-content">
        <h1>Visa</h1>

        <div class="user-block">
            <div class="user-avatar"
                 th:text="${(#authentication != null and #authentication.name != null and !#authentication.name.isBlank()) ? #strings.toUpperCase(#strings.substring(#authentication.name, 0, 1)) : 'V'}">V</div>
            <div class="user-info">
                <span class="user-name" sec:authentication="name">Opérateur</span>
                <span class="user-role">Backoffice</span>
            </div>
        </div>

        <ul class="nav-list">
            <li>
                <a th:href="@{/demandes}"
                   class="nav-item"
                   th:classappend="${activeLink == 'demandes'} ? ' active'">
                    <div class="nav-item-left">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14,2 14,8 20,8"/>
                            <line x1="8" y1="13" x2="16" y2="13"/>
                            <line x1="8" y1="17" x2="16" y2="17"/>
                        </svg>
                        Dossiers
                    </div>
                </a>
            </li>

            <li>
                <a th:href="@{/demandes/nouveau}"
                   class="nav-item"
                   th:classappend="${activeLink == 'nouveau'} ? ' active'">
                    <div class="nav-item-left">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14,2 14,8 20,8"/>
                            <line x1="12" y1="18" x2="12" y2="12"/>
                            <line x1="9" y1="15" x2="15" y2="15"/>
                        </svg>
                        Nouveau dossier
                    </div>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                </a>
            </li>

            <li>
                <a th:href="@{/demandes/antecedents}"
                   class="nav-item"
                   th:classappend="${activeLink == 'antecedents'} ? ' active'">
                    <div class="nav-item-left">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        Antécédents
                    </div>
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <form th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="btn-logout" style="border:none;background:transparent;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16,17 21,12 16,7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Déconnexion
                </button>
            </form>
        </div>
    </div>

</aside>

</body>
</html>
