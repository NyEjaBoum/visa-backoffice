<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!--
  Usage: th:replace="~{fragments/sidebar :: sidebar('demandes')}"
  activeLink values: 'demandes', 'nouveau'
-->
<aside th:fragment="sidebar(activeLink)" class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo-text">Visa<span>Back</span></div>
        <div class="sidebar-logo-badge">Office</div>
    </div>

    <div class="sidebar-section-label">Navigation</div>

    <ul class="sidebar-menu">
        <li>
            <a th:href="@{/demandes}"
               th:classappend="${activeLink == 'demandes'} ? ' active'"
               class="sidebar-link">
                <span class="sidebar-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                </span>
                Demandes
            </a>
        </li>
        <li>
            <a th:href="@{/demandes/nouveau}"
               th:classappend="${activeLink == 'nouveau'} ? ' active'"
               class="sidebar-link">
                <span class="sidebar-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                </span>
                Créer une demande
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <div class="sidebar-user">
            <div class="sidebar-user-avatar">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div class="sidebar-user-info">
                <span class="sidebar-user-name" sec:authentication="name">Opérateur</span>
                <span class="sidebar-user-role">Opérateur</span>
            </div>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="sidebar-logout" title="Déconnexion">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </form>
    </div>
</aside>

</body>
</html>
