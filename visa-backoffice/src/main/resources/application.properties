spring.application.name=visa-backoffice

spring.datasource.url=jdbc:postgresql://localhost:5432/visa_gestion?currentSchema=dev
spring.datasource.username=app_dev
spring.datasource.password=dev_pwd
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=dev
spring.jpa.properties.hibernate.format_sql=true

spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Upload — chemin absolu dans le dossier personnel de l'utilisateur
app.upload.dir=${user.home}/visa-backoffice-uploads
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
